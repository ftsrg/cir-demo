version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - BASIC_AUTH_FILE=/app/config/credentials.json
    volumes:
      - ./backend/examples:/app/examples:ro
      - ./backend/bin:/app/bin:ro
      - ./backend/config:/app/config:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
      - VITE_API_ROOT=${HOST_API_ROOT:-https://localhost}
    ports:
      - 3333:443
    depends_on:
      - backend
