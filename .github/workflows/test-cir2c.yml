name: cir2c Test Suite

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # needed to post/update the PR comment

jobs:
  build:
    name: Build cir2c
    runs-on: ubuntu-latest
    container:
      # The llvm image is the base for cir-demo-backend and has clang+cir-opt
      # at /opt/cir/bin (on PATH), cmake, ninja, and python3.
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build cir2c
        run: |
          cmake -S cir2c -B cir2c/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR=/opt/cir/lib/cmake/llvm \
            -DMLIR_DIR=/opt/cir/lib/cmake/mlir
          cmake --build cir2c/build --target cir2c -j $(nproc)

      - name: Upload cir2c binary
        uses: actions/upload-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/cir2c

  test-integration:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run integration tests
        run: |
          mkdir -p cir2c/test/integration/output
          JOBS=4 RUN_LLVM=0 RUN_ESBMC=0 \
            bash cir2c/test/run_tests.sh \
              --json-out /tmp/integration.json \
            || true
          cat /tmp/integration.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-integration
          path: /tmp/integration.json

      - name: Report results
        uses: ./.github/actions/report-results

  test-llvm:
    name: LLVM SingleSource tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run LLVM SingleSource tests
        run: |
          mkdir -p cir2c/test/llvm-eval/output
          JOBS=4 RUN_INTEGRATION=0 RUN_ESBMC=0 RUN_LLVM=1 \
            bash cir2c/test/run_tests.sh \
              --json-out /tmp/llvm.json \
            || true
          cat /tmp/llvm.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-llvm
          path: /tmp/llvm.json

      - name: Report results
        uses: ./.github/actions/report-results

  test-esbmc:
    name: ESBMC eval tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run esbmc-eval tests
        run: |
          mkdir -p cir2c/test/esbmc-eval/output
          JOBS=4 RUN_INTEGRATION=0 RUN_LLVM=0 RUN_ESBMC=1 \
            bash cir2c/test/run_tests.sh \
              --externalize-std \
              --json-out /tmp/esbmc.json \
            || true
          cat /tmp/esbmc.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-esbmc
          path: /tmp/esbmc.json

      - name: Report results
        uses: ./.github/actions/report-results

  test-esbmc-std:
    name: ESBMC eval tests (STD)
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run esbmc-eval tests (no-externalize-std)
        run: |
          mkdir -p cir2c/test/esbmc-eval/output
          JOBS=4 RUN_INTEGRATION=0 RUN_LLVM=0 RUN_ESBMC=1 \
            bash cir2c/test/run_tests.sh \
              --no-externalize-std \
              --json-out /tmp/esbmc-std.json \
            || true
          cat /tmp/esbmc-std.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-esbmc-std
          path: /tmp/esbmc-std.json

      - name: Report results
        uses: ./.github/actions/report-results
