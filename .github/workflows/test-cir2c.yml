name: cir2c Test Suite

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # needed to post/update the PR comment

jobs:
  build:
    name: Build cir2c
    runs-on: ubuntu-latest
    container:
      # The llvm image is the base for cir-demo-backend and has clang+cir-opt
      # at /opt/cir/bin (on PATH), cmake, ninja, and python3.
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cir2c
        run: |
          ./build-static-binaries.sh

      - name: Upload cir2c binary
        uses: actions/upload-artifact@v4
        with:
          name: cir2c-binary
          path: output/cir2c

  test-integration:
    name: Integration tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run integration tests
        run: |
          mkdir -p cir2c/test/integration/output
          JOBS=4 RUN_LLVM=0 RUN_ESBMC=0 \
            bash cir2c/test/run_tests.sh \
              --json-out /tmp/integration.json \
            || true
          cat /tmp/integration.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-integration
          path: /tmp/integration.json

  test-llvm:
    name: LLVM SingleSource tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run LLVM SingleSource tests
        run: |
          mkdir -p cir2c/test/llvm-eval/output
          JOBS=4 RUN_INTEGRATION=0 RUN_ESBMC=0 RUN_LLVM=1 \
            bash cir2c/test/run_tests.sh \
              --json-out /tmp/llvm.json \
            || true
          cat /tmp/llvm.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-llvm
          path: /tmp/llvm.json

  test-esbmc:
    name: ESBMC eval tests
    needs: build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ftsrg/cir-demo-llvm:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download cir2c binary
        uses: actions/download-artifact@v4
        with:
          name: cir2c-binary
          path: cir2c/build/

      - name: Mark cir2c executable
        run: chmod +x cir2c/build/cir2c

      - name: Link /opt/cir to backend/bin
        run: ln -s /opt/cir backend/bin

      - name: Install GNU parallel
        run: apt-get update -qq && apt-get install -y --no-install-recommends parallel

      - name: Run esbmc-eval tests
        run: |
          mkdir -p cir2c/test/esbmc-eval/output
          JOBS=4 RUN_INTEGRATION=0 RUN_LLVM=0 RUN_ESBMC=1 \
            bash cir2c/test/run_tests.sh \
              --json-out /tmp/esbmc.json \
            || true
          cat /tmp/esbmc.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-esbmc
          path: /tmp/esbmc.json

  collect:
    name: Collect results
    needs: [test-integration, test-llvm, test-esbmc]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download integration results
        uses: actions/download-artifact@v4
        with:
          name: results-integration
          path: /tmp/
        continue-on-error: true

      - name: Download LLVM results
        uses: actions/download-artifact@v4
        with:
          name: results-llvm
          path: /tmp/
        continue-on-error: true

      - name: Download esbmc results
        uses: actions/download-artifact@v4
        with:
          name: results-esbmc
          path: /tmp/
        continue-on-error: true

      # Build the PR comment table and decide the overall pass/fail.
      # We use Python to parse the JSON files and produce the markdown table.
      - name: Build PR comment and check failures
        id: report
        run: |
          python3 - << 'PYEOF'
          import json, os, sys

          suites = [
              ("Integration", "/tmp/integration.json"),
              ("LLVM SingleSource", "/tmp/llvm.json"),
              ("esbmc-eval", "/tmp/esbmc.json"),
          ]

          rows = {}
          total_failed = 0
          for name, path in suites:
              try:
                  with open(path) as f:
                      d = json.load(f)
              except Exception:
                  d = {"total": "?", "passed": "?", "compiled_not_run": "?",
                       "skipped": "?", "timed_out": "?", "failed": "?",
                       "mapper_failed": "?", "compile_failed": "?", "mismatch": "?"}
              rows[name] = d
              if isinstance(d.get("failed"), int):
                  total_failed += d["failed"]

          # Markdown table
          header = "| Metric | Integration | LLVM SingleSource | esbmc-eval |"
          sep    = "| --- | ---: | ---: | ---: |"

          def row(label, key):
              vals = " | ".join(str(rows[n].get(key, "?")) for n, _ in suites)
              return f"| {label} | {vals} |"

          table = "\n".join([
              "## cir2c Test Results",
              "",
              header, sep,
              row("Total",             "total"),
              row("✅ Passed",          "passed"),
              row("🔗 Compiled, not run","compiled_not_run"),
              row("⏩ Skipped",          "skipped"),
              row("⏱️ Timed out",         "timed_out"),
              row("❌ **Failed**",        "failed"),
              row("  mapper failed",    "mapper_failed"),
              row("  compile failed",   "compile_failed"),
              row("  output mismatch",  "mismatch"),
          ])

          if total_failed > 0:
              table += f"\n\n> ⚠️ **{total_failed} test(s) failed.**"
          else:
              table += "\n\n> ✅ All tests passed."

          # Write to GitHub environment file
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              # multiline output: use delimiter
              delim = "EOF_TABLE"
              f.write(f"table<<{delim}\n{table}\n{delim}\n")
              f.write(f"total_failed={total_failed}\n")

          print(table)
          PYEOF

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cir2c-test-results
          message: ${{ steps.report.outputs.table }}

      - name: Fail if any tests failed
        if: steps.report.outputs.total_failed != '0'
        run: |
          echo "::error::${{ steps.report.outputs.total_failed }} test(s) failed across the suites."
          exit 1
