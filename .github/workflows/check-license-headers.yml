name: Check License Headers

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  check-licenses:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Check for missing license headers
        id: check
        run: |
          cd ${{ github.workspace }}
          
          # Run license header script (adds headers to files)
          python .github/scripts/add-license-header.py \
            .github/scripts/license-header-apache
          
          git restore backend/examples/esbmc-eval

          python .github/scripts/add-license-header.py \
            .github/scripts/license-header-cc \
            backend/examples/esbmc-eval/
          
          # Check if any files were modified using git diff
          MODIFIED_FILES=$(git diff --name-only)
          MODIFIED_COUNT=$(echo "$MODIFIED_FILES" | grep -v '^$' | wc -l)
          echo "modified_count=$MODIFIED_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$MODIFIED_COUNT" -gt 0 ]; then
            echo "❌ Found $MODIFIED_COUNT file(s) missing license headers" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## Files Missing License Headers" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$MODIFIED_FILES" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### How to fix" >> $GITHUB_STEP_SUMMARY
            echo "Run the following commands to add license headers:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
            echo "python .github/scripts/add-license-header.py .github/scripts/license-header-apache.txt ." >> $GITHUB_STEP_SUMMARY
            echo "git restore backend/examples/esbmc-eval" >> $GITHUB_STEP_SUMMARY
            echo "python .github/scripts/add-license-header.py .github/scripts/license-header-cc.txt backend/examples/esbmc-eval/" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All files have proper license headers" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
