name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cir2c
        run: |
          chmod +x build-static-binaries.sh
          ./build-static-binaries.sh

      - name: Verify cir2c binary
        run: |
          file output/cir2c
          ls -lh output/cir2c
